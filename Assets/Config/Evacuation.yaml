behaviors:
  Evacuation:
    trainer_type: ppo

    hyperparameters:
      batch_size: 1024
      buffer_size: 40960
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 30000000
    time_horizon: 512
    summary_freq: 10000
    keep_checkpoints: 5
    checkpoint_interval: 500000
    threaded: false

environment_parameters:
  num_agents:
    curriculum:
      - name: Lesson1_Solo
        completion_criteria:
          measure: reward
          behavior: Evacuation
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.7
        value: 1.0
      - name: Lesson2_Obstacles
        completion_criteria:
          measure: reward
          behavior: Evacuation
          signal_smoothing: true
          min_lesson_length: 300
          threshold: 0.6
        value: 1.0
      - name: Lesson3_SmallCrowd
        completion_criteria:
          measure: reward
          behavior: Evacuation
          signal_smoothing: true
          min_lesson_length: 500
          threshold: 0.3
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 5.0
            max_value: 15.0
      - name: Lesson4_MediumCrowd
        completion_criteria:
          measure: reward
          behavior: Evacuation
          signal_smoothing: true
          min_lesson_length: 500
          threshold: 0.2
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 15.0
            max_value: 30.0
      - name: Lesson5_Bottleneck
        completion_criteria:
          measure: reward
          behavior: Evacuation
          signal_smoothing: true
          min_lesson_length: 500
          threshold: 0.05
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 30.0
            max_value: 60.0
      - name: Lesson6_Threat
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 40.0
            max_value: 80.0

  corridor_width:
    curriculum:
      - name: Lesson1_Solo
        completion_criteria:
          measure: reward
          behavior: Evacuation
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.7
        value: 4.0
      - name: Lesson2_Obstacles
        completion_criteria:
          measure: reward
          behavior: Evacuation
          signal_smoothing: true
          min_lesson_length: 300
          threshold: 0.6
        value: 3.0
      - name: Lesson3_SmallCrowd
        completion_criteria:
          measure: reward
          behavior: Evacuation
          signal_smoothing: true
          min_lesson_length: 500
          threshold: 0.3
        value: 2.5
      - name: Lesson4_MediumCrowd
        completion_criteria:
          measure: reward
          behavior: Evacuation
          signal_smoothing: true
          min_lesson_length: 500
          threshold: 0.2
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 1.0
            max_value: 2.0
      - name: Lesson5_Bottleneck
        completion_criteria:
          measure: reward
          behavior: Evacuation
          signal_smoothing: true
          min_lesson_length: 500
          threshold: 0.05
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 0.69
            max_value: 1.5
      - name: Lesson6_Threat
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 0.69
            max_value: 1.5

  threat_active:
    curriculum:
      - name: Lesson1to5
        completion_criteria:
          measure: reward
          behavior: Evacuation
          signal_smoothing: true
          min_lesson_length: 10000
          threshold: 0.05
        value: 0.0
      - name: Lesson6_Threat
        value: 1.0